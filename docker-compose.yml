version: '3.8'

services:
  warp-socks:
    build: .
    container_name: warp-socks
    restart: always
    privileged: true
    cap_add:
      - NET_ADMIN
    ports:
      - "1080:1080"
    environment:
      - SOCKS_PORT=1080
      - RESTART_INTERVAL=3600
      # Optional: enable SOCKS5 username/password auth
      # If both are set, container will expose authenticated SOCKS5 via 3proxy.
      # - SOCKS_USER=change_me
      # - SOCKS_PASS=change_me
      # Optional: override internal WARP local proxy port (default 10080)
      - WARP_LOCAL_PORT=10080
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
